<div class="page-header animate-fade-in-up">
    <h1 class="page-title">Sécurité</h1>
    <p class="page-subtitle">Gérez la sécurité de votre compte</p>
</div>
<div class="card">
    <div class="card-header">
        <h3 class="panel-title">Changer le mot de passe</h3>
    </div>
    <div class="card-body">
        <form (ngSubmit)="changePassword()">
            <div class="form-group">
                <label class="form-label">Mot de passe actuel</label>
                <input type="password" class="form-input" [(ngModel)]="currentPwd" name="current" required>
            </div>
            <div class="form-group">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" class="form-input" [(ngModel)]="newPwd" name="new" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmer</label>
                <input type="password" class="form-input" [(ngModel)]="confirmPwd" name="confirm" required>
            </div>
            <button type="submit" class="btn btn-primary">Modifier le mot de passe</button>
        </form>
    </div>
</div>

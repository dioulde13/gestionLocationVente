<div class="auth-layout">
    <div class="auth-left">
        <div class="auth-card animate-scale-in">
            <div class="auth-logo">
                <img class="img-fluid" src="assets/movely1.png" alt="Movely" height="200" width="200" />
                <!-- <div class="auth-logo-icon"><i class="ph ph-car-profile" style="color: white;"></i></div>
                <div class="auth-logo-text">Auto<span>Loc</span></div> -->
            </div>
            <h1 class="auth-title">Inscription</h1>
            <p class="auth-subtitle">Créez votre compte Movely </p>

            <form (ngSubmit)="onSubmit()">
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label class="form-label" for="nom">Nom</label>
                        <input type="text" id="nom" class="form-input" placeholder="Votre nom" [(ngModel)]="form.nom"
                            name="nom" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="prenom">Prénom</label>
                        <input type="text" id="prenom" class="form-input" placeholder="Votre prénom"
                            [(ngModel)]="form.prenom" name="prenom" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-envelope"></i></span>
                        <input type="email" id="email" class="form-input" placeholder="votre@email.com"
                            [(ngModel)]="form.email" name="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="telephone">Téléphone</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-phone"></i></span>
                        <input type="tel" id="telephone" class="form-input" placeholder="+224 6XX XX XX XX"
                            [(ngModel)]="form.telephone" name="telephone" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="role">Vous êtes</label>
                    <select id="role" class="form-input" [(ngModel)]="form.role" name="role">
                        <option value="client">Client - Je veux louer</option>
                        <option value="proprietaire">Propriétaire - Je veux mettre en location</option>
                    </select>
                </div>
                @if (form.role === 'proprietaire') {
                <div class="form-group">
                    <label class="form-label" for="nomAgence">Nom de l'agence (optionnel)</label>
                    <input type="text" id="nomAgence" class="form-input" placeholder="Mon Agence"
                        [(ngModel)]="form.nomAgence" name="nomAgence">
                </div>
                }
                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-lock"></i></span>
                        <input type="password" id="password" class="form-input" placeholder="Min. 8 caractères"
                            [(ngModel)]="form.password" name="password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-lock"></i></span>
                        <input type="password" id="confirmPassword" class="form-input"
                            placeholder="Répétez le mot de passe" [(ngModel)]="confirmPassword" name="confirmPassword"
                            required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" [(ngModel)]="termsAccepted" name="terms"> J'accepte les <a
                            href="#">conditions d'utilisation</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" [class.btn-loading]="loading"
                    [disabled]="loading">
                    {{ loading ? 'Inscription en cours...' : "S'inscrire" }}
                </button>
            </form>
            <div class="auth-footer">
                Déjà un compte ? <a routerLink="/auth/connexion">Se connecter</a>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-right-content">
            <div style="font-size:5rem;margin-bottom:var(--space-1);"><img src="assets/movely1.png"></div>
            <h2>Rejoignez Movely</h2>
            <p>Créez votre compte en quelques minutes et commencez à louer ou mettre en location vos véhicules.</p>
        </div>
    </div>
</div>

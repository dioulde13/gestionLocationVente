<div class="auth-layout">
    <div class="auth-left">
        <div class="auth-card animate-scale-in">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="ph ph-car-profile" style="color: white;"></i></div>
                <div class="auth-logo-text">Auto<span>Loc</span></div>
            </div>
            <h1 class="auth-title">Nouveau mot de passe</h1>
            <p class="auth-subtitle">Choisissez un nouveau mot de passe sécurisé.</p>
            <form (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label class="form-label" for="password">Nouveau mot de passe</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-lock"></i></span>
                        <input type="password" id="password" class="form-input" placeholder="Min. 8 caractères"
                            [(ngModel)]="password" name="password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirmer</label>
                    <div class="form-input-group">
                        <span class="input-icon"><i class="ph ph-lock"></i></span>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Répétez"
                            [(ngModel)]="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" [class.btn-loading]="loading">
                    {{ loading ? 'Modification...' : 'Modifier le mot de passe' }}
                </button>
            </form>
            <div class="auth-footer"><a routerLink="/auth/connexion">← Retour à la connexion</a></div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-right-content">
            <div style="font-size:5rem;margin-bottom:var(--space-6);">🔒</div>
            <h2>Sécurité</h2>
            <p>Choisissez un mot de passe fort avec au moins 8 caractères.</p>
        </div>
    </div>
</div>
